[defaults]
recipe_repo = "https://github.com/paudley/ai-notes"
recipe_subdir = "strix-halo"
recipe_author = "Blackcat Informatics Inc."
repo_subpath = "."
output_root = "packages"

[packages.aocl-utils-gfx1151]
recipe_key = "aocl_utils"
template = "cmake"
upstream_version = "5.2.2"
pkgdesc = "AOCL CPU feature detection library rebuilt for Strix Halo gfx1151"
url = "https://github.com/amd/aocl-utils"
license = ["BSD"]
arch_reference = ["aur/aocl-utils", "aur/aocl-utils-aocc"]
authoritative_reference = "aur/aocl-utils"
advisory_references = ["aur/aocl-utils-aocc"]
divergence_notes = [
  "Uses amdclang as the compiler baseline but intentionally leaves AOCL-Utils itself off the more aggressive recipe flag bundle because build testing showed -famd-opt is a no-op here.",
  "Uses the upstream 5.2.2 release tarball; recipe commit, date, and path-history count are recorded as provenance."
]
update_notes = [
  "When the AUR baseline changes, re-check license packaging and install layout against aur/aocl-utils first, then compare any AOCC-specific drift from aur/aocl-utils-aocc.",
  "If the recipe starts carrying source patches here, convert them into patch files under patches/aocl-utils-gfx1151 rather than inline shell edits."
]
provides = ["aocl-utils"]
conflicts = ["aocl-utils"]
depends = []
makedepends = ["cmake", "ninja", "rocm-llvm-gfx1151"]
options = ["staticlibs", "!lto"]
compiler_dep = "rocm-llvm-gfx1151"
source_type = "tarball"
source_url = "https://github.com/amd/aocl-utils/archive/refs/tags/5.2.2.tar.gz"
src_subdir = "aocl-utils-5.2.2"
install_prefix = "/usr"
patches_dir = "patches/aocl-utils-gfx1151"
scaffold_notes = [
  "This scaffold is rebased onto the current AUR aocl-utils 5.2.2 package rather than the older aocc-specific variant.",
  "The older AUR aocl-utils-aocc package remains an advisory sibling because it captures the AOCC-specific lane, even though the current non-AOCC aocl-utils package is the closer baseline for this toolchain.",
  "The recipe intentionally disables LTO because AOCL-LibM links AOCL-Utils archives with GNU ld.",
  "Build testing showed -famd-opt is a compile-time no-op here, so the scaffold keeps it out of the AOCL-Utils compile flags while still using amdclang as the compiler baseline."
]

[packages.aocl-libm-gfx1151]
recipe_key = "aocl_libm"
template = "scons-aocl-libm"
upstream_version = "5.2.2"
pkgdesc = "AMD AOCL-LibM rebuilt with Zen 5 tuning for Strix Halo gfx1151"
url = "https://github.com/amd/aocl-libm-ose.git"
license = ["BSD-3-Clause", "MIT", "Apache-2.0"]
arch_reference = ["aur/aocl"]
authoritative_reference = "none"
advisory_references = ["aur/aocl"]
divergence_notes = [
  "There is no standalone Arch-family AOCL-LibM package, so this package is recipe-first and uses the broader aur/aocl bundle only for install-layout and metadata expectations.",
  "The package keeps AOCL-LibM out of CPython's own link line; it is intended as a downstream math library, not part of Python's PGO training path."
]
update_notes = [
  "When updating, audit upstream AOCL-LibM licensing and bundled notices directly from source rather than assuming the advisory aur/aocl metadata is sufficient.",
  "If AOCL-Utils packaging changes, re-check the runtime dependency and any RPATH or SONAME assumptions here.",
  "Keep the SCons compatibility carry as a source patch file instead of inline sed edits."
]
provides = ["aocl-libm"]
conflicts = ["aocl-libm"]
depends = ["aocl-utils-gfx1151", "gcc-libs", "glibc"]
makedepends = ["git", "patchelf", "python", "rocm-llvm-gfx1151", "scons"]
compiler_dep = "rocm-llvm-gfx1151"
source_refs = ["aocl-libm::git+https://github.com/amd/aocl-libm-ose.git#tag=5.2.2"]
source_patches = ["0001-scons-support-arch-amdclang-toolchain.patch"]
source_patches_replace_recipe_patches = true
sha256sums = ["SKIP"]
src_subdir = "aocl-libm"
install_prefix = "/usr"
patches_dir = "packages/aocl-libm-gfx1151"
scaffold_notes = [
  "There is no standalone AOCL-LibM package in Arch, CachyOS, or AUR; the closest packaging lane is the broader AUR aocl bundle, which is only advisory for install-layout cleanup patterns.",
  "The recipe carries three upstream-compatibility source edits; the package keeps them as a source patch file, plus a post-install RPATH fix in package().",
  "Use Arch's system scons from makedepends directly. Do not recreate the recipe's venv-local pip bootstrap inside PKGBUILD; that makes package builds network-dependent.",
  "Pass resolved compiler paths to SCons through ALM_CC and ALM_CXX because AOCL-LibM validates those variables as existing paths.",
  "Keep AOCL-LibM out of the CPython link line. It is intended for downstream numerical libraries, not Python's own PGO run.",
  "Build testing showed libalm.so does not advertise a versioned SONAME, so the scaffold does not export it in provides()."
]

[packages.python-gfx1151]
recipe_key = "cpython"
template = "autoconf-python"
upstream_version = "3.14.4"
pkgdesc = "The Python programming language rebuilt with amdclang for Strix Halo gfx1151"
url = "https://www.python.org/"
license = ["PSF-2.0"]
arch_reference = ["core/python", "cachyos-znver4/python"]
authoritative_reference = "core/python"
advisory_references = ["cachyos-znver4/python"]
divergence_notes = [
  "Uses the Arch system-Python package shape as the integration baseline while layering in the recipe's amdclang plus PGO/LTO approach.",
  "Intentionally keeps pip/setuptools split out of the base interpreter package and preserves Arch's externally managed environment behavior."
]
update_notes = [
  "Always diff against the current Arch python PKGBUILD first, then inspect CachyOS for any CPU-tuning or toolchain deltas worth carrying.",
  "Treat system-Python replacement as gated on a fresh torch/vllm smoke run after any major Python, ROCm, or recipe change."
]
provides = ["python=3.14.4", "python3", "python-externally-managed"]
conflicts = ["python"]
replaces = ["python", "python3", "python-externally-managed"]
depends = ["bzip2", "expat", "gdbm", "libffi", "libnsl", "libxcrypt", "mpdecimal", "openssl", "tzdata", "zlib", "zstd"]
makedepends = ["bluez-libs", "gdb", "rocm-llvm-gfx1151", "sqlite", "tk", "ttf-font", "xorg-server-xvfb", "xz"]
optdepends = [
  "python-setuptools: for building Python packages using tooling that is usually bundled with Python",
  "python-pip: for installing Python packages using tooling that is usually bundled with Python",
  "python-pipx: for installing Python software not packaged on Arch Linux",
  "sqlite: for a default database integration",
  "xz: for lzma",
  "tk: for tkinter"
]
compiler_dep = "rocm-llvm-gfx1151"
source_type = "tarball"
source_url = "https://www.python.org/ftp/python/3.14.4/Python-3.14.4.tar.xz"
src_subdir = "Python-3.14.4"
install_prefix = "/usr"
patches_dir = "patches/python-gfx1151"
scaffold_notes = [
  "This scaffold is intentionally rebased onto current Arch/Cachy Python 3.14.x instead of the recipe's older CPython 3.13.12 pin.",
  "The scaffold preserves the recipe's rule that all vllm-env.sh compiler flags must be unset before configure so AOCL-LibM does not contaminate the PGO training run.",
  "Before production cutover, verify feature parity with the current Arch python package, especially tkinter, sqlite extension loading, PEP 668, and debug-path sanitization.",
  "The scaffold intentionally disables ensurepip so pip stays split into separate packages, matching Arch system integration more closely.",
  "The scaffold uses the official CPython release tarball rather than a git mirror because the package is pinned to a tagged release and full VCS fetches are unnecessarily expensive here.",
  "Treat the system-Python replacement as gated on a successful Python-3.14 vLLM smoke test against the coherent TheRock ROCm stack."
]

[packages.python-vllm-rocm-gfx1151]
recipe_key = "vllm"
template = "python-project-vllm"
upstream_version = "0.20.0"
pkgdesc = "High-throughput and memory-efficient inference engine for LLMs with ROCm, rebuilt for Strix Halo gfx1151"
url = "https://github.com/vllm-project/vllm"
license = ["Apache-2.0"]
arch_reference = ["aur/python-vllm"]
authoritative_reference = "aur/python-vllm"
advisory_references = []
divergence_notes = [
  "This package is ROCm-specific even though the closest Arch-family baseline is the generic aur/python-vllm package.",
  "Carries a deliberate Python-3.14 compatibility delta and recipe-specific ROCm/AITER integration that are not part of the generic baseline.",
  "Carries repo-owned Gemma 4 validation lanes for Strix Halo because the host-proven path is narrower than upstream defaults: AITER unified attention, TRITON unquantized MoE, text-only multimodal limits, and per-checkpoint eager/compiled decisions.",
  "Carries a repo-owned Qwen3.5 hybrid/GDN patch lane for the parts of Blackcat Informatics' advisory recipe that are still missing from the maintained vLLM 0.20.0 package source.",
  "Carries a repo-owned Qwen speculative-decoding patch lane for the padded EAGLE/MTP drafter batch Triton kernel on ROCm.",
  "Uses upstream vLLM 0.20.0 DFlash model/runtime and speculators config parser support instead of carrying the former narrow parser backport locally.",
  "Carries a ROCm FlashAttention Triton availability fix so vLLM detects the local pure-Python flash_attn package when it selects AITER's Triton AMD interface.",
  "Carries a ROCm CK/direct FlashAttention interface gate that keeps the forced FLASH_ATTN probe blocked at backend selection until the imported flash_attn module exposes vLLM's paged-KV varlen API."
]
update_notes = [
  "Check upstream vllm release notes and pyproject metadata first, then reconcile the Python upper-bound and hard-coded supported-version list with the current state of Python 3.14 support.",
  "On 2026-04-29, adopted upstream vLLM 0.20.0 with the local ROCm/Gemma/Qwen/TorchAO/FlashAttention carry refreshed as a single package patch. The release brings first-party Python 3.14 and torch 2.11 metadata support plus upstream DFlash model/runtime pieces, so the former local Python-version and narrow DFlash parser backports are no longer separate source patches.",
  "When validating a new model, usage pattern, or stable-tag gap, scout upstream release notes, open issues, open PRs, and recent commits before freezing local patch carry. Gemma 4 needed exactly that: the durable fixes were the unified-attention backend selection and server/template follow-ups, while the earlier AITER fused-MoE carries were later pruned once the validated default lane stayed on TRITON MoE.",
  "If numba remains part of the Python 3.14 story, capture it as a real source patch or package dependency decision rather than a no-op scripted edit.",
  "Keep vllm --version as a metadata-only smoke path. If upstream CLI imports optional OpenAI or Triton modules eagerly again, prefer restoring a lazy import boundary over adding unrelated hard runtime dependencies just for version output.",
  "Treat openai-harmony as a normal runtime-closure package, not an optdepend, if this repo wants GPT-OSS/Harmony paths to work. The current AUR baseline is a good starting point, but it omits the upstream python-pydantic runtime dependency and should not be copied blindly. The reason to package it locally is closure and metadata correctness, not a ROCm-specific patch lane.",
  "Keep the local Mistral Common lane new enough to export mistral_common.protocol.instruct.request.ReasoningEffort. The concrete host failure was python-mistral-common 1.8.6-1, which was too old for the current Transformers/Gemma 4 processor path.",
  "Keep the vendored triton_kernels path gated on the installed Triton runtime rather than forcing python-triton-gfx1151 to emulate CUDA-only APIs such as triton.language.target_info. On this ROCm lane, treat unavailable vendored Triton kernels as a clean fallback, not as a hard runtime error.",
  "Keep the ROCm large-head unified-attention prefill tile reduction unless upstream vLLM or Triton lands a fix for the 64 KiB LDS overflow. The concrete host failure was Gemma 4 global attention on gfx1151 requesting 66560 bytes of shared memory from the Triton 2D unified-attention kernel.",
  "Keep the setup.py compiler-flag forwarding patch unless upstream starts passing CFLAGS/CXXFLAGS/HIPFLAGS into the CMake ROCm build itself. The concrete packaging failure was $srcdir leaking into shipped extension modules because the HIP lane was built without Arch prefix-map flags.",
  "Keep the PKGBUILD's clean HIP version handoff unless ROCm's CMake HIP probe stops treating unrelated hipconfig stderr as a failed version query. The concrete host failure was inherited Lmod shell-function import warnings on hipconfig stderr causing FindHIP.cmake to cache HIP_VERSION=0.0.0 and reject /opt/rocm.",
  "Keep LTO disabled for this package unless the ROCm HIP shared-module link path becomes compatible with it. The concrete host failure was _moe_C.abi3.so / _rocm_C.abi3.so link failure with `LLVM gold plugin has failed to create LTO module: Invalid record`.",
  "Keep the gfx1x AITER enablement and Gemma 4 ROCM_AITER_UNIFIED_ATTN preference unless upstream lands a ROCm-safe single-backend path for heterogeneous-head Gemma 4 models. The concrete host failure was successful Gemma 4 initialization followed by Triton unified-attention decode miscompilation (`operation scheduled before its operands`) and garbage output on gfx1151.",
  "Keep the gfx1x AITER and Gemma 4 ROCM_AITER_UNIFIED_ATTN section of `0016-rocm-refresh-local-carry-for-vllm-0.20.0.patch` limited to gfx1x AITER support plus the Gemma 4 backend override, and do not reintroduce the broader fused-MoE default flip unless fresh host validation across real ROCm models proves it safe. The 2026-04-17 reference-host `google/gemma-4-26B-A4B-it` text smoke faulted the GPU when that policy forced the AITER fused-MoE 2-stage path without an explicit runtime override.",
  "Keep the repo-owned Gemma 4 text-only smoke lanes on `enforce_eager=True` / `--enforce-eager` until separate host validation proves the compiled/CUDAGraph ROCm path is clean for each promoted checkpoint. vLLM documents eager mode as disabling compilation and CUDAGraph capture, so treat relaxing it as a follow-up performance lane rather than a silent default change. On 2026-04-20, fresh-cache compiled probes proved that 26B-A4B and 31B do not require eager for the tracked offline text smoke. E2B still requires eager: the compiled+CUDAGraph probe reached `generation_ok` and then returned corrupted non-ASCII text instead of the expected five-word answer. Run compiled-probe revalidation with fresh `VLLM_CACHE_ROOT`, `TORCHINDUCTOR_CACHE_DIR`, and `TRITON_CACHE_DIR` paths, because stale Inductor artifacts can produce misleading shape-mismatch failures.",
  "Keep Gemma 4 26B-A4B server startup timeouts long enough for cold reference-host loads. A 300-second budget killed the server while it was still loading safetensors shards; the helper now defaults this constrained 26B-A4B lane to 420 seconds.",
  "Use the tracked `compiled-probe`, `kernel-probe`, `multimodal`, and `quantization-probe` scenario tags for future investigations instead of adding terminal-only one-offs; keep `exploratory` on any scenario that should not run as part of broad package validation.",
  "Keep the Qwen3.5/GDN section of `0016-rocm-refresh-local-carry-for-vllm-0.20.0.patch` until upstream vLLM lands equivalent ROCm-safe Qwen3.5/GDN handling. The patch carries the still-missing pieces from Blackcat Informatics' advisory lane: AMD-restricted FLA autotune grids, float32 GDN exponent operands, GDN warmup at T=64 only, hybrid block-size realignment after ROCm platform updates, and hybrid full-attention fallback away from AITER attention.",
  "On 2026-04-20, rebuilt installed Qwen3.5 text smokes passed in both eager and compiled mode. `vllm.qwen3_5.0_8b.text.compiled` ran with `enforce_eager=False`, `torch.compile`, CUDAGraph capture, GDN prefill, ROCM_ATTN, and output `Ready.`, so the tiny Qwen3.5 text lane does not require eager mode under the current installed stack.",
  "On 2026-04-20, rebuilt installed `Qwen/Qwen3.6-35B-A3B` also passed the unquantized no-AITER control in compiled mode with `enforce_eager=False`, TRITON unquantized MoE, GDN prefill, ROCM_ATTN, torch.compile, CUDAGraph capture, and output `ready`. Keep the FP8 Qwen3.6 probes blocked separately; the unquantized eager and compiled controls both pass.",
  "Do not restore the dropped Gemma 4 ROCm AITER MoE intermediate-padding carry unless a future explicit AITER fused-MoE lane reproduces a real alignment failure after the AITER backend is re-enabled on purpose. The 2026-04-17 validated reference-host lane used TRITON backend for Unquantized MoE, so that patch was removed as dormant carry. The 2026-04-19 forced AITER MoE server probe failed earlier with `ValueError: ROCm AITer MoE backend is not available for this configuration`, while default/automatic and forced Triton MoE server probes passed.",
  "Keep Gemma 4 text-only serving fully text-only by zeroing `image`, `audio`, and `video` in `--limit-mm-per-prompt`. The concrete Gemma 4 26B-A4B server failure was vLLM still entering multimodal warmup and then faulting the GPU during engine initialization when `video` remained implicit.",
  "Keep TorchAO version checks metadata-only on generic startup paths unless upstream reorganizes its quantization imports. The concrete host failure was an external python-torchao-rocm package whose optional _C.abi3.so extension was both missing a usable torch/lib runpath and built against an incompatible PyTorch ABI, causing warning noise during unrelated vLLM startup when vLLM imported the TorchAO quantization module just to ask a version question.",
  "Keep TorchAO runtime validation on the eager lane unless vLLM changes its TorchAO quantization policy. On 2026-04-20, the tiny TorchAO scenarios passed after the self-hosted rebuild, but a direct `--execution-mode compiled` attempt still initialized vLLM with `quantization=torchao` and `enforce_eager=True`, disabling torch.compile and CUDAGraphs.",
  "Keep the merged TorchAO startup-laziness patch intact unless upstream reorganizes its quantization imports. That carry now covers both metadata-only version checks and quantization-registry lazy imports, which are jointly required to keep generic startup paths off the full TorchAO module unless `quantization == \"torchao\"`.",
  "Keep the merged CLI/runtime-light startup patch intact unless upstream makes the generic startup path import-clean on its own. That carry now keeps plain `vllm --help` off the benchmark tree, OpenAI chat-utils path, Transformers-backed `arg_utils` helpers, and the heavy shared runtime command imports.",
  "Keep the ROCm top-k/top-p sampler patch unless upstream or the local Triton lane proves `apply_top_k_top_p_triton` safe for large Qwen-family vocabularies on gfx1151. The 2026-04-19 standalone repro faulted the GPU with logits shaped `(32, 248320)`, top-k enabled, and top-p `0.9`, while vLLM's existing PyTorch fallback completed on the same tensor.",
  "Keep the padded EAGLE/MTP drafter count patch unless upstream makes `eagle_prepare_next_token_padded_kernel` keep `valid_count` in one scalar dtype across Triton branches. The concrete ROCm/Triton failure is `Mismatched type for valid_count between then block (uint32) and else block (int1)` when the Qwen MTP server path uses the padded drafter batch.",
  "Treat DFlash as upstream-owned in vLLM 0.20.0. Promote runnable DFlash scenarios only after this package's 0.20.0 runtime path passes reference-host validation.",
  "Keep the FlashAttention Triton availability check aligned with the packaged ROCm flash_attn interface. The local package does not ship a `flash_attn.flash_attn_triton_amd` module; it exposes AITER's Triton AMD backend through `flash_attn.flash_attn_interface` when `FLASH_ATTENTION_TRITON_AMD_ENABLE=TRUE`.",
  "Keep the CK/direct FlashAttention interface gate aligned with the packaged ROCm flash_attn interface. The local CK lane currently exposes a Dao-style direct varlen function and direct smokes, not vLLM's paged-KV varlen call surface required by the V1 `FLASH_ATTN` backend. The gate reports FlashAttention version 2 on ROCm so unsupported CK/direct calls are blocked deeper in the paged-KV CK kernel path.",
  "Treat `Qwen/Qwen3.6-35B-A3B-FP8` as a blocked FP8 MoE probe, not a passing smoke, until a ROCm/gfx1151 FP8 MoE backend exists. With AITER disabled, vLLM reports `No FP8 MoE backend supports the deployment configuration`; the Triton and batched Triton FP8 MoE gates only advertise ROCm FP8 support for gfx9, not gfx1151.",
  "Keep patch application idempotent across reused src/ trees. The concrete host failure while cutting pkgrel=14 was a file-adding patch aborting in `prepare()` after a previous failed build left a partially patched source tree behind.",
  "Keep the inherited makepkg compile flags when layering Strix tuning flags. Overwriting CFLAGS/CXXFLAGS drops Arch's build-path prefix maps and can leak $srcdir paths into the shipped ROCm extension modules.",
  "Keep HIP build-path prefix-map flags explicit and forwarded through setup.py. The ROCm extension build does not automatically inherit the host C/C++ prefix-map settings into CMAKE_HIP_FLAGS, so sanitization has to be carried through HIPFLAGS and then bridged into CMake.",
  "Keep SageMaker integration optional unless this repo intentionally packages model_hosting_container_standards; missing SageMaker helpers should disable only SageMaker-specific routes, not the base CLI or local server startup paths.",
  "Keep the ROCm GCN-arch fallback import-safe on Strix Halo. AMDSMI ASIC-info probes can fail even when the device is visible; that must degrade to torch.cuda probing rather than crashing during module import.",
  "Treat the current external python-torchao-rocm _C-extension failure as a host-package defect, not a blocker for this vLLM lane. Generic startup should stay clean after the local TorchAO-import patch, and the remaining follow-up only matters if this repo needs actual TorchAO custom ops or torchao-backed serving paths that truly require the native extension.",
  "Treat runtime validation against the live ROCm stack as mandatory; a successful wheel build is not enough."
]
provides = ["python-vllm-rocm", "python-vllm"]
conflicts = ["python-vllm-rocm", "python-vllm"]
depends = ["amdsmi-gfx1151", "numactl", "python-aiohttp", "python-blake3", "python-cachetools", "python-cbor2", "python-cloudpickle", "python-diskcache", "python-einops", "python-fastapi", "python-gguf", "python-gfx1151", "python-huggingface-hub", "python-ijson", "python-importlib-metadata", "python-mistral-common-gfx1151", "python-msgspec", "python-openai", "python-openai-harmony-gfx1151", "python-opencv", "python-prometheus-fastapi-instrumentator", "python-psutil", "python-py-cpuinfo", "python-pybase64", "python-pydantic", "python-pytorch-opt-rocm-gfx1151", "python-pyzmq", "python-soundfile", "python-starlette", "python-sympy", "python-torchvision-rocm-gfx1151", "python-tqdm", "python-transformers-gfx1151", "python-triton-gfx1151", "python-uvloop", "python-watchfiles", "rocblas-gfx1151", "uvicorn"]
makedepends = ["cmake", "ninja", "python-installer", "python-pip", "python-setuptools", "python-setuptools-scm", "python-wheel", "rocm-llvm-gfx1151"]
options = ["!lto"]
source_type = "tarball"
source_url = "https://github.com/vllm-project/vllm/archive/refs/tags/v0.20.0.tar.gz"
extra_sources = ["0016-rocm-refresh-local-carry-for-vllm-0.20.0.patch"]
extra_sha256sums = ["SKIP"]
source_patches = ["0016-rocm-refresh-local-carry-for-vllm-0.20.0.patch"]
src_subdir = "vllm-0.20.0"
patches_dir = "patches/python-vllm-rocm-gfx1151"
scaffold_notes = [
  "There does not appear to be a current dedicated python-vllm-rocm AUR package; the closest package baseline is the generic AUR python-vllm package, with ROCm-specific integration coming from this recipe.",
  "Uses the latest stable upstream release tarball, currently v0.20.0, instead of a floating full Git clone.",
  "Carries a package-local CLI import patch so vllm --version remains a metadata-only path instead of importing optional OpenAI and Triton runtime modules at startup.",
  "Carries a ROCm-specific Triton compatibility patch so the vendored triton_kernels tree is treated as unavailable when the installed Triton runtime lacks CUDA-only APIs such as triton.language.target_info or triton.constexpr_function.",
  "Carries a ROCm-platform fallback patch so Strix Halo can fall back from AMDSMI ASIC-info lookup to torch.cuda without tripping the import-time warning_once circular import path.",
  "Carries an optional-SageMaker patch so vllm --help and the base OpenAI server routes stay usable when model_hosting_container_standards is not installed.",
  "Carries a ROCm Triton unified-attention tile-size patch so large-head prefill paths such as Gemma 4 global attention do not request more than 64 KiB of LDS/shared memory on gfx1151.",
  "Carries a setup.py flag-forwarding patch so host CFLAGS/CXXFLAGS and HIPFLAGS are passed into the CMake ROCm extension build explicitly. This keeps Arch prefix-map sanitization and Strix tuning flags active in the shipped HIP extension modules.",
  "Passes a clean hipconfig-derived HIP_VERSION into CMake so the ROCm HIP package discovery path does not depend on stderr-clean ambient shell startup state.",
  "Disables LTO for this package. Re-enabling inherited -flto=* flags makes ROCm shared-module links such as _moe_C.abi3.so and _rocm_C.abi3.so fail with `LLVM gold plugin has failed to create LTO module: Invalid record`.",
  "Carries a gfx1x AITER enablement patch and a Gemma 4 backend-selection patch so heterogeneous-head Gemma 4 models can prefer ROCM_AITER_UNIFIED_ATTN on Strix Halo instead of forcing the Triton unified-attention backend that currently miscompiles during decode.",
  "Carries a Qwen3.5 hybrid/GDN patch that keeps AMD FLA autotune away from gfx1151 page-faulting shapes, preserves hybrid block-size alignment after ROCm platform updates, and routes hybrid full-attention layers away from AITER attention because Qwen3.5/GDN can choose non-power-of-2 block sizes.",
  "Does not carry the broader fused-MoE default-policy flip, and no longer carries the dormant Gemma 4 AITER-only MoE padding patch. The 2026-04-17 reference-host text/basic-server validation used AITER unified attention but `Using TRITON backend for Unquantized MoE`, so the durable carry stays limited to the host-proven lane.",
  "The current repo-owned `google/gemma-4-26B-A4B-it` validation lane is tracked through `tools/gemma4_text_smoke.py` and `tools/gemma4_server_smoke.py`. It is text-only basic serving with `--limit-mm-per-prompt {\"image\":0,\"audio\":0,\"video\":0}`, `--max-model-len 128`, `--max-num-batched-tokens 32`, and a 420-second server startup timeout. After installing the repaired Triton package, the fresh-cache 26B-A4B and 31B offline text compiled probes passed with AITER unified attention, torch.compile, and CUDAGraph capture; 26B-A4B also used TRITON unquantized MoE. Do not generalize that to E2B: the fresh-cache E2B compiled+CUDAGraph probe initialized, compiled, captured graphs, and generated corrupted non-ASCII text, while the earlier no-CUDAGraph E2B compiled probe faulted the GPU during initialization/warmup.",
  "The 2026-04-19 26B-A4B MoE backend probes passed for default/automatic MoE and forced `--moe-backend triton`, both with `Using TRITON backend for Unquantized MoE`; forced `--moe-backend aiter` failed fast with `ValueError: ROCm AITer MoE backend is not available for this configuration`. Treat TRITON unquantized MoE as the maintained sparse MoE lane.",
  "The wider Gemma 4 scenario matrix is tracked under `inference/scenarios/vllm-gemma4.toml`. Broad scenario selections skip entries tagged `exploratory` by default, so multimodal, remaining compiled-path, forced-MoE-backend experiments, and real-model TorchAO probes stay opt-in unless a reference-host run explicitly promotes them.",
  "The E2B server scenario matrix also has a tracked forced-attention probe for `--attention-backend TRITON_ATTN`. After the 2026-04-20 self-hosted rebuild, `vllm.gemma4.e2b.server.basic` and `vllm.gemma4.e2b.server.attn-triton` both pass; the old E2B server/AsyncLLM initialization fault no longer reproduces.",
  "A separate forced AITER FlashAttention probe is tracked as `vllm.gemma4.e2b.server.attn-aiter-fa-blocked`. On 2026-04-20, `--attention-backend ROCM_AITER_FA` failed before serving because vLLM rejected `AttentionBackendEnum.ROCM_AITER_FA` with `compute capability not supported`; classify later FA behavior only after this backend gate changes.",
  "The E2B image-input server smoke now passes as a representative multimodal warmup check after the 2026-04-20 self-hosted rebuild. The smoke helper uses a valid embedded PNG fixture and mode-specific multimodal response validation; keep the remaining image/audio/video and multimodal-tool scenarios exploratory until each mode has its own reference-host pass.",
  "Depends on the local python-transformers-gfx1151 closure package rather than the distro python-transformers lane because Gemma 4 support first appears in upstream transformers 5.5.x and the older host package did not ship transformers.models.gemma4.",
  "Depends on the local python-mistral-common-gfx1151 closure package rather than the stale host python-mistral-common 1.8.x lane because Transformers 5.5.x imports ReasoningEffort from mistral_common.protocol.instruct.request.",
  "Carries a merged TorchAO startup-laziness patch so generic vLLM startup paths keep TorchAO version checks metadata-only and only import `TorchAOConfig` when `quantization == torchao`. This keeps optional broken host python-torchao-rocm packages from surfacing warning noise on unrelated code paths.",
  "Carries a merged CLI/runtime-light startup patch so plain `vllm --help` stays off the benchmark latency tree, OpenAI chat-utils tool-call path, Transformers-backed `arg_utils` helpers, and heavy `serve`/`launch`/`run-batch` runtime imports unless the user actually selected those flows.",
  "Carries a ROCm top-k/top-p sampler guard so large-vocabulary Qwen3.5-family runs use vLLM's existing PyTorch filtering fallback instead of the Triton filter path that faulted the GPU on gfx1151.",
  "Carries a padded EAGLE/MTP drafter-count typing patch so Qwen speculative decoding can compile the padded drafter batch Triton kernel on ROCm.",
  "Uses upstream vLLM 0.20.0 DFlash support instead of carrying the former narrow speculators config parser patch locally.",
  "The reference host now uses the local python-torchao-rocm-gfx1151 replacement lane, so the old external python-torchao-rocm failure is historical rather than current state. Generic vLLM startup should still stay TorchAO-clean on non-TorchAO code paths, and the tracked helpers for actual --quantization torchao support remain tools/torchao_vllm_smoke.py plus the Gemma 4 TorchAO scenarios.",
  "`tools/torchao_vllm_smoke.py` now covers the tiny no-download checkpoint, a serialized real-model probe, and a real-model online quantization path. After the 2026-04-20 self-hosted rebuild, `vllm.gemma4.e2b.torchao.online-real-model` passed with `quantization=torchao`, `enforce_eager=True`, `ROCM_AITER_UNIFIED_ATTN`, and 10.62 GiB model-loading memory. The serialized real-model scenario is an expected blocked probe: it writes processor files correctly, then fails in TorchAO/vLLM weight loading with `AttributeError: 'Tensor' object has no attribute 'tensor_data_names'`.",
  "makepkg -e reuses src/, so build() intentionally reapplies the carried source patches before wheel generation instead of assuming prepare() already ran in the current tree.",
  "makepkg -f can also reuse a partially patched src/ tree across failed iterations. The PKGBUILD now re-extracts the v0.20.0 tarball and reapplies the full carried patch series on a known-clean tree whenever its source-patch sentinels are missing, instead of relying on per-patch stamp files under src/.patch-state.",
  "Preserve makepkg's inherited CFLAGS/CXXFLAGS when layering Strix tuning flags, and feed the same prefix-map flags into HIPFLAGS, so Arch's build-path sanitization survives the ROCm/HIP compile lane too.",
  "Upstream openai-harmony is a small Rust/PyO3 helper library with published manylinux wheels, not a ROCm-specific component. If Arch still lacks an official package, the right local story is a closure package derived from aur/python-openai-harmony. If this repo ingests it locally, it should still inherit the normal Strix build lane for applicable native code: Zen 5 / znver5 CPU tuning, -O3 or equivalent, LTO when compatible, and PGO when the build system exposes a maintainable path.",
