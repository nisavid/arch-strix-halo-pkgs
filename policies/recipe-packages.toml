[defaults]
recipe_repo = "https://github.com/paudley/ai-notes"
recipe_subdir = "strix-halo"
recipe_author = "Blackcat Informatics Inc."
repo_subpath = "."
output_root = "packages"

[packages.aocl-utils-gfx1151]
recipe_key = "aocl_utils"
template = "cmake"
upstream_version = "5.2.2"
pkgdesc = "AOCL CPU feature detection library rebuilt for Strix Halo gfx1151"
url = "https://github.com/amd/aocl-utils"
license = ["BSD"]
arch_reference = ["aur/aocl-utils", "aur/aocl-utils-aocc"]
authoritative_reference = "aur/aocl-utils"
advisory_references = ["aur/aocl-utils-aocc"]
divergence_notes = [
  "Uses amdclang as the compiler baseline but intentionally leaves AOCL-Utils itself off the more aggressive recipe flag bundle because build testing showed -famd-opt is a no-op here.",
  "Tracks the upstream 5.2.2 release tarball rather than a floating branch so pkgver tracks the real upstream release plus the local recipe revision."
]
update_notes = [
  "When the AUR baseline changes, re-check license packaging and install layout against aur/aocl-utils first, then compare any AOCC-specific drift from aur/aocl-utils-aocc.",
  "If the recipe starts carrying source patches here, convert them into patch files under patches/aocl-utils-gfx1151 rather than inline shell edits."
]
provides = ["aocl-utils"]
conflicts = ["aocl-utils"]
depends = []
makedepends = ["cmake", "ninja", "rocm-llvm-gfx1151"]
options = ["staticlibs", "!lto"]
compiler_dep = "rocm-llvm-gfx1151"
source_type = "tarball"
source_url = "https://github.com/amd/aocl-utils/archive/refs/tags/5.2.2.tar.gz"
src_subdir = "aocl-utils-5.2.2"
install_prefix = "/usr"
patches_dir = "patches/aocl-utils-gfx1151"
scaffold_notes = [
  "This scaffold is rebased onto the current AUR aocl-utils 5.2.2 package rather than the older aocc-specific variant.",
  "The older AUR aocl-utils-aocc package remains an advisory sibling because it captures the AOCC-specific lane, even though the current non-AOCC aocl-utils package is the closer baseline for this toolchain.",
  "The recipe intentionally disables LTO because AOCL-LibM links AOCL-Utils archives with GNU ld.",
  "Build testing showed -famd-opt is a compile-time no-op here, so the scaffold keeps it out of the AOCL-Utils compile flags while still using amdclang as the compiler baseline."
]

[packages.aocl-libm-gfx1151]
recipe_key = "aocl_libm"
template = "scons-aocl-libm"
upstream_version = "5.2.1"
pkgdesc = "AMD AOCL-LibM rebuilt with Zen 5 tuning for Strix Halo gfx1151"
url = "https://github.com/amd/aocl-libm-ose.git"
license = ["BSD-3-Clause", "MIT", "Apache-2.0"]
arch_reference = ["aur/aocl"]
authoritative_reference = "none"
advisory_references = ["aur/aocl"]
divergence_notes = [
  "There is no standalone Arch-family AOCL-LibM package, so this package is recipe-first and uses the broader aur/aocl bundle only for install-layout and metadata expectations.",
  "The package keeps AOCL-LibM out of CPython's own link line; it is intended as a downstream math library, not part of Python's PGO training path."
]
update_notes = [
  "When updating, audit upstream AOCL-LibM licensing and bundled notices directly from source rather than assuming the advisory aur/aocl metadata is sufficient.",
  "If AOCL-Utils packaging changes, re-check the runtime dependency and any RPATH or SONAME assumptions here."
]
provides = ["aocl-libm"]
conflicts = ["aocl-libm"]
depends = ["aocl-utils-gfx1151", "gcc-libs", "glibc"]
makedepends = ["git", "patchelf", "python", "rocm-llvm-gfx1151", "scons"]
compiler_dep = "rocm-llvm-gfx1151"
src_subdir = "aocl-libm"
install_prefix = "/usr"
patches_dir = "patches/aocl-libm-gfx1151"
scaffold_notes = [
  "There is no standalone AOCL-LibM package in Arch, CachyOS, or AUR; the closest packaging lane is the broader AUR aocl bundle, which is only advisory for install-layout cleanup patterns.",
  "The recipe carries three upstream-compatibility patch steps plus a post-install RPATH fix; those are rendered into prepare() and package().",
  "Keep AOCL-LibM out of the CPython link line. It is intended for downstream numerical libraries, not Python's own PGO run.",
  "Build testing showed libalm.so does not advertise a versioned SONAME, so the scaffold does not export it in provides()."
]

[packages.python-gfx1151]
recipe_key = "cpython"
template = "autoconf-python"
upstream_version = "3.14.4"
pkgdesc = "The Python programming language rebuilt with amdclang for Strix Halo gfx1151"
url = "https://www.python.org/"
license = ["PSF-2.0"]
arch_reference = ["core/python", "cachyos-znver4/python"]
authoritative_reference = "core/python"
advisory_references = ["cachyos-znver4/python"]
divergence_notes = [
  "Uses the Arch system-Python package shape as the integration baseline while layering in the recipe's amdclang plus PGO/LTO approach.",
  "Intentionally keeps pip/setuptools split out of the base interpreter package and preserves Arch's externally managed environment behavior."
]
update_notes = [
  "Always diff against the current Arch python PKGBUILD first, then inspect CachyOS for any CPU-tuning or toolchain deltas worth carrying.",
  "Treat system-Python replacement as gated on a fresh torch/vllm smoke run after any major Python, ROCm, or recipe change."
]
provides = ["python=3.14.4", "python3", "python-externally-managed"]
conflicts = ["python"]
replaces = ["python"]
depends = ["bzip2", "expat", "gdbm", "libffi", "libnsl", "libxcrypt", "mpdecimal", "openssl", "tzdata", "zlib", "zstd"]
makedepends = ["bluez-libs", "gdb", "rocm-llvm-gfx1151", "sqlite", "tk", "ttf-font", "xorg-server-xvfb", "xz"]
optdepends = [
  "python-setuptools: for building Python packages using tooling that is usually bundled with Python",
  "python-pip: for installing Python packages using tooling that is usually bundled with Python",
  "python-pipx: for installing Python software not packaged on Arch Linux",
  "sqlite: for a default database integration",
  "xz: for lzma",
  "tk: for tkinter"
]
compiler_dep = "rocm-llvm-gfx1151"
source_type = "tarball"
source_url = "https://www.python.org/ftp/python/3.14.4/Python-3.14.4.tar.xz"
src_subdir = "Python-3.14.4"
install_prefix = "/usr"
patches_dir = "patches/python-gfx1151"
scaffold_notes = [
  "This scaffold is intentionally rebased onto current Arch/Cachy Python 3.14.x instead of the recipe's older CPython 3.13.12 pin.",
  "The scaffold preserves the recipe's rule that all vllm-env.sh compiler flags must be unset before configure so AOCL-LibM does not contaminate the PGO training run.",
  "Before production cutover, verify feature parity with the current Arch python package, especially tkinter, sqlite extension loading, PEP 668, and debug-path sanitization.",
  "The scaffold intentionally disables ensurepip so pip stays split into separate packages, matching Arch system integration more closely.",
  "The scaffold uses the official CPython release tarball rather than a git mirror because the package is pinned to a tagged release and full VCS fetches are unnecessarily expensive here.",
  "Treat the system-Python replacement as gated on a successful Python-3.14 vLLM smoke test against the coherent TheRock ROCm stack."
]

[packages.python-vllm-rocm-gfx1151]
recipe_key = "vllm"
template = "python-project-vllm"
upstream_version = "0.19.0"
pkgdesc = "High-throughput and memory-efficient inference engine for LLMs with ROCm, rebuilt for Strix Halo gfx1151"
url = "https://github.com/vllm-project/vllm"
license = ["Apache-2.0"]
arch_reference = ["aur/python-vllm"]
authoritative_reference = "aur/python-vllm"
advisory_references = []
divergence_notes = [
  "This package is ROCm-specific even though the closest Arch-family baseline is the generic aur/python-vllm package.",
  "Carries a deliberate Python-3.14 compatibility delta and recipe-specific ROCm/AITER integration that are not part of the generic baseline."
]
update_notes = [
  "Check upstream vllm release notes and pyproject metadata first, then reconcile the Python upper-bound and hard-coded supported-version list with the current state of Python 3.14 support.",
  "If numba remains part of the Python 3.14 story, capture it as a real source patch or package dependency decision rather than a no-op scripted edit.",
  "Keep vllm --version as a metadata-only smoke path. If upstream CLI imports optional OpenAI or Triton modules eagerly again, prefer restoring a lazy import boundary over adding unrelated hard runtime dependencies just for version output.",
  "Treat openai-harmony as a normal runtime-closure package, not an optdepend, if this repo wants GPT-OSS/Harmony paths to work. The current AUR baseline is a good starting point, but it omits the upstream python-pydantic runtime dependency and should not be copied blindly. The reason to package it locally is closure and metadata correctness, not a ROCm-specific patch lane.",
  "Keep the local Mistral Common lane new enough to export mistral_common.protocol.instruct.request.ReasoningEffort. The concrete host failure was python-mistral-common 1.8.6-1, which was too old for the current Transformers/Gemma 4 processor path.",
  "Keep the vendored triton_kernels path gated on the installed Triton runtime rather than forcing python-triton-gfx1151 to emulate CUDA-only APIs such as triton.language.target_info. On this ROCm lane, treat unavailable vendored Triton kernels as a clean fallback, not as a hard runtime error.",
  "Keep the ROCm large-head unified-attention prefill tile reduction unless upstream vLLM or Triton lands a fix for the 64 KiB LDS overflow. The concrete host failure was Gemma 4 global attention on gfx1151 requesting 66560 bytes of shared memory from the Triton 2D unified-attention kernel.",
  "Keep the setup.py compiler-flag forwarding patch unless upstream starts passing CFLAGS/CXXFLAGS/HIPFLAGS into the CMake ROCm build itself. The concrete packaging failure was $srcdir leaking into shipped extension modules because the HIP lane was built without Arch prefix-map flags.",
  "Keep LTO disabled for this package unless the ROCm HIP shared-module link path becomes compatible with it. The concrete host failure was _moe_C.abi3.so / _rocm_C.abi3.so link failure with `LLVM gold plugin has failed to create LTO module: Invalid record`.",
  "Keep the gfx1x AITER enablement and Gemma 4 ROCM_AITER_UNIFIED_ATTN preference unless upstream lands a ROCm-safe single-backend path for heterogeneous-head Gemma 4 models. The concrete host failure was successful Gemma 4 initialization followed by Triton unified-attention decode miscompilation (`operation scheduled before its operands`) and garbage output on gfx1151.",
  "Keep TorchAO version checks metadata-only on generic startup paths unless upstream reorganizes its quantization imports. The concrete host failure was an external python-torchao-rocm package whose optional _C.abi3.so extension was both missing a usable torch/lib runpath and built against an incompatible PyTorch ABI, causing warning noise during unrelated vLLM startup when vLLM imported the TorchAO quantization module just to ask a version question.",
  "Keep the quantization registry importing TorchAOConfig lazily unless upstream stops probing every quantization backend during generic config validation. The concrete host failure after the first TorchAO patch was `vllm --help` still importing vllm.model_executor.layers.quantization and then pulling in .torchao through get_quantization_config().",
  "Keep plain `vllm --help` off the benchmark latency import path unless upstream makes the benchmark CLI import-clean on generic startup. The concrete host failure after the second TorchAO patch was `vllm --help` still emitting the warning because CLI setup imported `vllm.entrypoints.cli.benchmark.latency`, which reaches `EngineArgs` at module import time.",
  "Keep patch application idempotent across reused src/ trees. The concrete host failure while cutting pkgrel=14 was 0008 aborting in prepare() with torchao_utils.py already exists after a previous failed build left a partially patched source tree behind.",
  "Keep the inherited makepkg compile flags when layering Strix tuning flags. Overwriting CFLAGS/CXXFLAGS drops Arch's build-path prefix maps and can leak $srcdir paths into the shipped ROCm extension modules.",
  "Keep HIP build-path prefix-map flags explicit and forwarded through setup.py. The ROCm extension build does not automatically inherit the host C/C++ prefix-map settings into CMAKE_HIP_FLAGS, so sanitization has to be carried through HIPFLAGS and then bridged into CMake.",
  "Keep SageMaker integration optional unless this repo intentionally packages model_hosting_container_standards; missing SageMaker helpers should disable only SageMaker-specific routes, not the base CLI or local server startup paths.",
  "Keep the ROCm GCN-arch fallback import-safe on Strix Halo. AMDSMI ASIC-info probes can fail even when the device is visible; that must degrade to torch.cuda probing rather than crashing during module import.",
  "Treat the current external python-torchao-rocm _C-extension failure as a host-package defect, not a blocker for this vLLM lane. Generic startup should stay clean after the local TorchAO-import patch, and the remaining follow-up only matters if this repo needs actual TorchAO custom ops or torchao-backed serving paths that truly require the native extension.",
  "Treat runtime validation against the live ROCm stack as mandatory; a successful wheel build is not enough."
]
provides = ["python-vllm-rocm", "python-vllm"]
conflicts = ["python-vllm-rocm", "python-vllm"]
depends = ["amdsmi-gfx1151", "numactl", "python-aiohttp", "python-blake3", "python-cachetools", "python-cbor2", "python-cloudpickle", "python-diskcache", "python-einops", "python-fastapi", "python-gguf", "python-gfx1151", "python-huggingface-hub", "python-ijson", "python-importlib-metadata", "python-mistral-common-gfx1151", "python-msgspec", "python-openai", "python-openai-harmony-gfx1151", "python-opencv", "python-prometheus-fastapi-instrumentator", "python-psutil", "python-py-cpuinfo", "python-pybase64", "python-pydantic", "python-pytorch-opt-rocm-gfx1151", "python-pyzmq", "python-soundfile", "python-starlette", "python-sympy", "python-torchvision-rocm-gfx1151", "python-tqdm", "python-transformers-gfx1151", "python-triton-gfx1151", "python-uvloop", "python-watchfiles", "rocblas-gfx1151", "uvicorn"]
makedepends = ["cmake", "ninja", "python-installer", "python-pip", "python-setuptools", "python-setuptools-scm", "python-wheel", "rocm-llvm-gfx1151"]
source_type = "tarball"
source_url = "https://github.com/vllm-project/vllm/archive/refs/tags/v0.19.0.tar.gz"
extra_sources = ["0001-python-3.14-version-gates.patch", "0002-cli-version-avoids-eager-runtime-imports.patch", "0003-rocm-gate-vendored-triton-kernels-on-runtime-support.patch", "0004-rocm-fallback-and-optional-sagemaker-standards.patch", "0005-rocm-reduce-triton-unified-attention-prefill-tile-for-large-heads.patch", "0006-setup.py-forward-host-and-hip-flags-into-cmake.patch", "0007-rocm-enable-gfx1x-aiter-and-prefer-it-for-gemma4.patch", "0008-torchao-version-check-stays-metadata-only.patch", "0009-lazy-import-torchao-config-only-for-torchao-quantization.patch", "0010-cli-help-avoids-eager-benchmark-imports.patch"]
extra_sha256sums = ["SKIP", "SKIP", "SKIP", "SKIP", "SKIP", "SKIP", "SKIP", "SKIP", "SKIP"]
source_patches = ["0001-python-3.14-version-gates.patch", "0002-cli-version-avoids-eager-runtime-imports.patch", "0003-rocm-gate-vendored-triton-kernels-on-runtime-support.patch", "0004-rocm-fallback-and-optional-sagemaker-standards.patch", "0005-rocm-reduce-triton-unified-attention-prefill-tile-for-large-heads.patch", "0006-setup.py-forward-host-and-hip-flags-into-cmake.patch", "0007-rocm-enable-gfx1x-aiter-and-prefer-it-for-gemma4.patch", "0008-torchao-version-check-stays-metadata-only.patch", "0009-lazy-import-torchao-config-only-for-torchao-quantization.patch", "0010-cli-help-avoids-eager-benchmark-imports.patch"]
src_subdir = "vllm-0.19.0"
patches_dir = "patches/python-vllm-rocm-gfx1151"
scaffold_notes = [
  "There does not appear to be a current dedicated python-vllm-rocm AUR package; the closest package baseline is the generic AUR python-vllm package, with ROCm-specific integration coming from this recipe.",
  "Use the latest stable upstream release tarball (v0.19.0) instead of a floating full Git clone. Upstream currently exposes a 0.19.1 release candidate but not a final 0.19.1 release, so the stable tag is the safer packaging baseline.",
  "This scaffold carries the minimal Python-3.14 source patch needed to build from the stable tarball: relax the Python upper bound and extend the hard-coded CMake supported-version list through 3.14.",
  "Carries a package-local CLI import patch so vllm --version remains a metadata-only path instead of importing optional OpenAI and Triton runtime modules at startup.",
  "Carries a ROCm-specific Triton compatibility patch so the vendored triton_kernels tree is treated as unavailable when the installed Triton runtime lacks CUDA-only APIs such as triton.language.target_info or triton.constexpr_function.",
  "Carries a ROCm-platform fallback patch so Strix Halo can fall back from AMDSMI ASIC-info lookup to torch.cuda without tripping the import-time warning_once circular import path.",
  "Carries an optional-SageMaker patch so vllm --help and the base OpenAI server routes stay usable when model_hosting_container_standards is not installed.",
  "Carries a ROCm Triton unified-attention tile-size patch so large-head prefill paths such as Gemma 4 global attention do not request more than 64 KiB of LDS/shared memory on gfx1151.",
  "Carries a setup.py flag-forwarding patch so host CFLAGS/CXXFLAGS and HIPFLAGS are passed into the CMake ROCm extension build explicitly. This keeps Arch prefix-map sanitization and Strix tuning flags active in the shipped HIP extension modules.",
  "Disables LTO for this package. Re-enabling inherited -flto=* flags makes ROCm shared-module links such as _moe_C.abi3.so and _rocm_C.abi3.so fail with `LLVM gold plugin has failed to create LTO module: Invalid record`.",
  "Carries a gfx1x AITER enablement patch and a Gemma 4 backend-selection patch so heterogeneous-head Gemma 4 models can prefer ROCM_AITER_UNIFIED_ATTN on Strix Halo instead of forcing the Triton unified-attention backend that currently miscompiles during decode.",
  "Depends on the local python-transformers-gfx1151 closure package rather than the distro python-transformers lane because Gemma 4 support first appears in upstream transformers 5.5.x and the older host package did not ship transformers.models.gemma4.",
  "Depends on the local python-mistral-common-gfx1151 closure package rather than the stale host python-mistral-common 1.8.x lane because Transformers 5.5.x imports ReasoningEffort from mistral_common.protocol.instruct.request.",
  "Carries a TorchAO-import patch so generic vLLM startup paths do not import the full TorchAO quantization module just to check an installed version. This keeps optional broken host python-torchao-rocm packages from emitting startup warning noise on non-TorchAO code paths.",
  "Carries a follow-up TorchAO-registry patch so the quantization registry only imports TorchAOConfig when torchao quantization is actually requested. Generic config-validation and CLI/help flows still probe the quantization registry, so this second lazy-import boundary is required to suppress the same host warning completely.",
  "Carries a third CLI-help patch so plain `vllm --help` does not eagerly import the benchmark latency command tree. That benchmark module imports `EngineArgs` at module import time, which is enough to drag generic config/model startup back across the broken optional host TorchAO package.",
  "The currently installed external python-torchao-rocm package is still not import-clean at the native extension layer on this host, but generic vLLM startup should no longer import TorchAO eagerly on non-TorchAO code paths. Treat the remaining host TorchAO breakage as an optional-feature defect to revisit only if this repo needs working TorchAO custom ops or actual --quantization torchao support.",
  "makepkg -e reuses src/, so build() intentionally reapplies the carried source patches before wheel generation instead of assuming prepare() already ran in the current tree.",
  "makepkg -f can also reuse a partially patched src/ tree across failed iterations, so patch application is tracked with per-patch stamp files under src/.patch-state. Keep that idempotency layer unless the package starts forcing a clean source tree for every build.",
  "Preserve makepkg's inherited CFLAGS/CXXFLAGS when layering Strix tuning flags, and feed the same prefix-map flags into HIPFLAGS, so Arch's build-path sanitization survives the ROCm/HIP compile lane too.",
  "Upstream openai-harmony is a small Rust/PyO3 helper library with published manylinux wheels, not a ROCm-specific component. If Arch still lacks an official package, the right local story is a closure package derived from aur/python-openai-harmony. If this repo ingests it locally, it should still inherit the normal Strix build lane for applicable native code: Zen 5 / znver5 CPU tuning, -O3 or equivalent, LTO when compatible, and PGO when the build system exposes a maintainable path.",
  "Do not treat a successful build as sufficient for system-Python cutover; the gate is a real vLLM smoke test after the TheRock ROCm split packages are installed coherently.",
  "Keep the gfx1151 ROCm/AITER recipe patches in the source package, but evaluate Python-3.14 compatibility separately from ROCm runtime/linker issues.",
  "The earlier numba-pin idea is not currently part of the actual built package story; treat any numba change as a separate follow-up until it is backed by a real source patch."
]

