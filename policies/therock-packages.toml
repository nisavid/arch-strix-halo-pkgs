[repo]
pkgbase = "therock-gfx1151"
pkgver = "7.13.0pre"
pkgrel = 5
suffix = "-gfx1151"
url = "https://github.com/ROCm/TheRock"
license = ["custom:AMD"]
scan_roots = ["opt/rocm"]
bundle_conflict = "rocm-gfx1151-bin"

[filters]
ignore_globs = [
  "opt/rocm/bin/**/*.hip",
  "opt/rocm/bin/**/*.bat",
  "opt/rocm/bin/*.hip",
  "opt/rocm/bin/*.hipfb",
  "opt/rocm/bin/gfx*/**",
  "opt/rocm/bin/**/CTestTestfile.cmake",
  "opt/rocm/bin/**/generate_resource_spec",
  "opt/rocm/bin/*test*",
  "opt/rocm/bin/*bench*",
  "opt/rocm/bin/*validate*",
  "opt/rocm/bin/rdhc",
  "opt/rocm/bin/bn_*",
  "opt/rocm/bin/conv_*",
  "opt/rocm/bin/fused_*",
  "opt/rocm/bin/simple_*",
  "opt/rocm/bin/serialization_roundtrip",
  "opt/rocm/bin/hipblaslt-api-overhead",
  "opt/rocm/bin/knobs_usage",
  "opt/rocm/bin/rocrtst64",
  "opt/rocm/bin/MIOpen/**",
  "opt/rocm/clients/**",
  "opt/rocm/libhipcxx/.clang-format",
  "opt/rocm/libhipcxx/.clangd",
  "opt/rocm/libhipcxx/.git*",
  "opt/rocm/libhipcxx/.github/**",
  "opt/rocm/libhipcxx/.pre-commit-config.yaml",
  "opt/rocm/libhipcxx/.upstream-tests/**",
  "opt/rocm/libhipcxx/.vscode/**",
  "opt/rocm/libhipcxx/CMakeLists.txt",
  "opt/rocm/libhipcxx/CMakePresets.json",
  "opt/rocm/libhipcxx/cmake/test/**",
  "opt/rocm/libhipcxx/README.rst",
  "opt/rocm/libhipcxx/ci/**",
  "opt/rocm/libhipcxx/codegen/**",
  "opt/rocm/libhipcxx/examples/**",
  "opt/rocm/libhipcxx/test/**",
  "opt/rocm/libhipcxx/test",
  "opt/rocm/libhipcxx/utils/**",
  "opt/rocm/libhipcxx/utils",
  "opt/rocm/lib/libtest_linking_lib*.so",
  "opt/rocm/lib/rocrtst/**",
  "opt/rocm/lib/test_plugins/**",
  "opt/rocm/share/**/test/**",
  "opt/rocm/share/**/sample/**",
  "opt/rocm/share/doc/**",
  "opt/rocm/share/man/**",
  "opt/rocm/share/magma/testing/**",
  "opt/rocm/share/rdhc/**",
  "opt/rocm/src/**",
  "opt/rocm/tests/**",
]

[packages."rocm-gfx1151"]
desc = "Meta package for the local TheRock ROCm stack tuned for gfx1151"
provides = ["rocm"]
depends = [
  "rocm-core-gfx1151",
  "rocm-sysdeps-gfx1151",
  "rocminfo-gfx1151",
  "rocm-hip-sdk-gfx1151",
  "rocm-opencl-gfx1151",
  "rocm-ml-sdk-gfx1151",
  "rocm-developer-tools-gfx1151",
]
fileless = true

[packages."rocm-core-gfx1151"]
desc = "ROCm core runtime files from TheRock for gfx1151"
provides = ["rocm-core"]
depends = ["gcc-libs", "glibc", "python-gfx1151", "python-prettytable", "python-pyelftools", "python-yaml"]
post_copy_commands = [
  "install -d \"${pkgdir}/opt/rocm/bin\"",
  "ln -s ../libexec/rocm-core/rdhc.py \"${pkgdir}/opt/rocm/bin/rdhc\"",
]

[packages."comgr-gfx1151"]
desc = "ROCm code object manager from TheRock for gfx1151"
provides = ["comgr"]
post_copy_commands = [
  "sed -i -e 's/foreach(_cmake_expected_target IN ITEMS amd_comgr amd_comgr_loader test_amd_comgr_stub)/foreach(_cmake_expected_target IN ITEMS amd_comgr amd_comgr_loader)/' -e '/# Create imported target test_amd_comgr_stub/{N;d;}' -e '/list(APPEND _cmake_import_check_targets test_amd_comgr_stub )/{N;d;}' \"${pkgdir}/opt/rocm/lib/cmake/amd_comgr_stub/amd_comgr-targets.cmake\"",
  "sed -i '/# Import target \"test_amd_comgr_stub\" for configuration \"Release\"/,/list(APPEND _cmake_import_check_files_for_test_amd_comgr_stub .* )/d' \"${pkgdir}/opt/rocm/lib/cmake/amd_comgr_stub/amd_comgr-targets-release.cmake\"",
]

[packages."hsa-rocr-gfx1151"]
desc = "HSA runtime from TheRock for gfx1151"
provides = ["hsa-rocr", "hsakmt-roct"]
replaces = ["hsakmt-roct"]
depends = ["rocprofiler-register-gfx1151"]

[packages."rocminfo-gfx1151"]
desc = "rocminfo utility from TheRock for gfx1151"
provides = ["rocminfo"]
depends = ["hsa-rocr-gfx1151"]

[packages."rocm-device-libs-gfx1151"]
desc = "ROCm device libraries from TheRock for gfx1151"
provides = ["rocm-device-libs"]

[packages."rocm-language-runtime-gfx1151"]
desc = "ROCm language runtime from TheRock for gfx1151"
provides = ["rocm-language-runtime"]

[packages."rocm-hip-runtime-gfx1151"]
desc = "Compatibility meta package for ROCm HIP runtime support from TheRock for gfx1151"
provides = ["rocm-hip-runtime"]
depends = ["hip-runtime-amd-gfx1151", "rocm-language-runtime-gfx1151"]
fileless = true

[packages."hip-runtime-amd-gfx1151"]
desc = "HIP runtime libraries from TheRock for gfx1151"
provides = ["hip-runtime-amd"]
replaces = ["hip"]
depends = ["hsa-rocr-gfx1151", "comgr-gfx1151", "rocm-device-libs-gfx1151"]

[packages."rocm-hip-gfx1151"]
desc = "ROCm HIP development files from TheRock for gfx1151"
provides = ["rocm-hip"]
depends = ["hip-runtime-amd-gfx1151", "hipcc-gfx1151"]

[packages."hip-gfx1151"]
desc = "HIP API and headers from TheRock for gfx1151"
provides = ["hip"]
depends = ["rocm-hip-gfx1151"]

[packages."rocm-llvm-gfx1151"]
desc = "AMD LLVM toolchain from TheRock for gfx1151"
provides = ["rocm-llvm"]
depends = ["rocm-sysdeps-gfx1151"]

[packages."hipcc-gfx1151"]
desc = "hipcc compiler driver from TheRock for gfx1151"
provides = ["hipcc"]
depends = ["rocm-llvm-gfx1151", "hip-runtime-amd-gfx1151"]

[packages."rocm-cmake-gfx1151"]
desc = "ROCm CMake files from TheRock for gfx1151"
provides = ["rocm-cmake"]

[packages."rocm-openmp-gfx1151"]
desc = "Compatibility meta package for the ROCm OpenMP runtime from TheRock for gfx1151"
provides = ["rocm-openmp", "openmp-extras-runtime", "openmp-extras-dev"]
depends = ["rocm-llvm-gfx1151"]
fileless = true

[packages."rocm-smi-lib-gfx1151"]
desc = "ROCm SMI library from TheRock for gfx1151"
provides = ["rocm-smi-lib"]
depends = ["rocm-sysdeps-gfx1151"]
post_copy_commands = [
  "_rocm_smi_targets=\"${pkgdir}/opt/rocm/lib/cmake/rocm_smi/rocm_smiTargets.cmake\"",
  "perl -0pi -e 's#/home/runner/_work/rockrel/rockrel/output/build/third-party/sysdeps/linux/libdrm/build/stage/lib/rocm_sysdeps/lib/pkgconfig/\\.\\./\\.\\./include/libdrm#\\${_IMPORT_PREFIX}/lib/rocm_sysdeps/include/libdrm#g; s#/home/runner/_work/rockrel/rockrel/output/build/third-party/sysdeps/linux/libdrm/build/stage/lib/rocm_sysdeps/lib/pkgconfig/\\.\\./\\.\\./include#\\${_IMPORT_PREFIX}/lib/rocm_sysdeps/include#g' \"${_rocm_smi_targets}\"",
  "perl -0pi -e 's#\\$\\{_IMPORT_PREFIX\\}/\\{OAM_NAME\\}/include#\\${_IMPORT_PREFIX}/include/oam#g' \"${_rocm_smi_targets}\"",
]

[packages."amdsmi-gfx1151"]
desc = "AMD SMI library and tools from TheRock for gfx1151"
provides = ["amdsmi", "amd-smi-lib"]
depends = ["rocm-smi-lib-gfx1151", "python-gfx1151"]

[packages."rocm-opencl-runtime-gfx1151"]
desc = "ROCm OpenCL runtime from TheRock for gfx1151"
provides = ["rocm-opencl-runtime", "rocm-ocl-icd", "rocm-opencl-icd-loader", "opencl-driver"]
depends = ["rocm-core-gfx1151"]
skip_conflicts_for_provides = ["opencl-driver"]

[packages."rocm-opencl-sdk-gfx1151"]
desc = "ROCm OpenCL SDK files from TheRock for gfx1151"
provides = ["rocm-opencl-sdk"]
depends = ["rocm-opencl-runtime-gfx1151"]

[packages."rocm-opencl-gfx1151"]
desc = "Meta package for ROCm OpenCL components from TheRock for gfx1151"
provides = ["rocm-opencl"]
depends = ["rocm-opencl-runtime-gfx1151", "rocm-opencl-sdk-gfx1151"]
fileless = true

[packages."rocm-dbgapi-gfx1151"]
desc = "ROCm debug API from TheRock for gfx1151"
provides = ["rocm-dbgapi"]

[packages."rocm-debug-agent-gfx1151"]
desc = "ROCm debug agent from TheRock for gfx1151"
provides = ["rocm-debug-agent"]
depends = ["rocm-dbgapi-gfx1151"]

[packages."rocm-gdb-gfx1151"]
