# Read-only package freshness policy.
#
# Each package directory with a PKGBUILD must appear in exactly one family.
# Recorded values are the last reviewed upstream or baseline state, not
# necessarily the local package version.
#
# Roles:
# - primary: packaged source or release lane
# - candidate: reviewed branch lane that may become a pinned package source
# - scout: reviewed branch lane used for fix discovery or patch reduction
# - baseline: Arch-family package reference

[families.therock]
packages = ["therock-gfx1151"]
priority = "high"
workflow = "recipe_update"
checks = [
  { id = "ai-notes", role = "primary", kind = "submodule", path = "upstream/ai-notes", ref = "refs/heads/main", recorded = "a1d7a6816dd2c456bad9fcc7d61c53a4bd8c5fbd", comparison = "sha" },
]

