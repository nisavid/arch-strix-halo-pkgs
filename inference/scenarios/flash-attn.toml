[[scenario]]
id = "flash-attn.ck.backend-import"
summary = "FlashAttention backend import smoke on the CK path"
tags = ["smoke", "flash-attention", "ck"]

[scenario.given]
engine = "flash-attn"
model = "builtin"
tool = "flash_attn_smoke.ck-backend-import"

[scenario.when.env]
FLASH_ATTENTION_TRITON_AMD_ENABLE = "FALSE"

[[scenario.then.assert]]
kind = "exit_code.equals"
value = 0

[[scenario.then.assert]]
kind = "stdout.contains"
value = "mode ck-backend-import"

[[scenario.then.assert]]
kind = "stdout.contains"
value = "flash_attn_ck_import_ok"

