[[scenario]]
id = "lemonade.pooling.zembed-1-q4-k-m.embeddings"
summary = "Lemonade embeddings endpoint smoke for downloaded zembed-1 Q4_K_M GGUF"
tags = ["smoke", "lemonade", "pooling", "embeddings", "llamacpp", "zembed"]

[scenario.given]
engine = "lemonade"
model = "user.zembed-1-Q4_K_M-GGUF-Q4_K_M"
tool = "lemonade_pooling_smoke.embeddings"

[scenario.when]
argv = [
  "--base-url",
  "http://127.0.0.1:13305/api/v1",
]

[[scenario.then.assert]]
kind = "exit_code.equals"
value = 0

[[scenario.then.assert]]
kind = "stdout.contains"
value = "mode embeddings"

[[scenario.then.assert]]
kind = "stdout.contains"
value = "embedding_count 3"

[[scenario.then.assert]]
kind = "stdout.contains"
value = "embeddings_finite_ok"

[[scenario.then.assert]]
kind = "stdout.contains"
value = "embeddings_ok"

[[scenario]]
id = "lemonade.pooling.bge-reranker-v2-m3.rerank"
summary = "Lemonade reranking endpoint smoke for a downloaded BGE reranker model"
tags = ["smoke", "lemonade", "pooling", "rerank", "reranking", "llamacpp"]

[scenario.given]
engine = "lemonade"
model = "user.bge-reranker-v2-m3-Q8_0-GGUF"
tool = "lemonade_pooling_smoke.rerank"

[scenario.when]
argv = [
  "--base-url",
  "http://127.0.0.1:13305/api/v1",
]

[[scenario.then.assert]]
kind = "exit_code.equals"
value = 0

[[scenario.then.assert]]
kind = "stdout.contains"
value = "mode rerank"

[[scenario.then.assert]]
kind = "stdout.contains"
value = "score_count 3"

[[scenario.then.assert]]
kind = "stdout.contains"
value = "scores_finite_ok"

[[scenario.then.assert]]
kind = "stdout.contains"
value = "rerank_order 0,1,2"

[[scenario.then.assert]]
kind = "stdout.contains"
value = "rerank_ok"
