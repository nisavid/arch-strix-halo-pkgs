[[recipe_surface]]
id = "vllm.qwen.recipe.qwen3_5.benchmark.openai_chat"
summary = "Official Qwen3.5 OpenAI-compatible benchmark-client shape"
source_url = "https://docs.vllm.ai/projects/recipes/en/latest/Qwen/Qwen3.5.html#benchmarking"
