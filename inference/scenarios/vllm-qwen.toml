[[recipe_surface]]
id = "vllm.qwen.recipe.qwen3_5.server.long_context_yarn"
summary = "Official Qwen3.5 ultra-long-context YaRN override shape"
source_url = "https://docs.vllm.ai/projects/recipes/en/latest/Qwen/Qwen3.5.html#processing-ultra-long-texts"
