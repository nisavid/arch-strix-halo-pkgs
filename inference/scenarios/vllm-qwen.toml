[[scenario]]
id = "vllm.qwen3_5.0_8b.text.basic"
summary = "Qwen3.5 0.8B text-only offline smoke for the hybrid/GDN guard carry"
tags = ["smoke", "qwen", "qwen3.5", "hybrid", "gdn"]

[scenario.given]
engine = "vllm"
model = "Qwen/Qwen3.5-0.8B"
tool = "qwen_text_smoke"

[[scenario.then.assert]]
kind = "exit_code.equals"
value = 0

[[scenario.then.assert]]
kind = "stdout.contains"
value = "config_model_type qwen3_5"

[[scenario.then.assert]]
kind = "stdout.contains"
value = "generation_ok"

[[scenario.then.assert]]
kind = "stdout.contains"
value = "basic_ok"

[[scenario]]
id = "vllm.qwen3_6.35b-a3b-fp8.text.basic"
summary = "Qwen3.6 35B-A3B FP8 MoE text-only offline smoke for the Qwen3.5 MoE codepath"
tags = ["smoke", "qwen", "qwen3.6", "moe", "fp8"]

[scenario.given]
engine = "vllm"
model = "Qwen/Qwen3.6-35B-A3B-FP8"
tool = "qwen_text_smoke"

[scenario.when]
argv = ["--max-num-batched-tokens", "32"]

[[scenario.then.assert]]
kind = "exit_code.equals"
value = 0

[[scenario.then.assert]]
kind = "stdout.contains"
value = "config_model_type qwen3_5_moe"

[[scenario.then.assert]]
kind = "stdout.contains"
value = "generation_ok"

[[scenario.then.assert]]
kind = "stdout.contains"
value = "basic_ok"
