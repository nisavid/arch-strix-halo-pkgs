  "--random-output-len 512",
  "--num-prompts 1000",
  "--request-rate 20",
]
caveats = [
  "Convert to a benchmark-lite local scenario only after a Qwen server helper exists.",
]

[[recipe_surface]]
id = "vllm.qwen.recipe.qwen3_5.client.openai_multimodal"
summary = "Official Qwen3.5 OpenAI-compatible multimodal client shape"
