[[scenario]]
id = "vllm.qwen3_6.35b-a3b-fp8.text.fp8-moe-no-aiter-blocked"
summary = "Qwen3.6 35B-A3B FP8 MoE backend-selection probe with AITER disabled"
tags = ["qwen", "qwen3.6", "moe", "fp8", "kernel-probe", "exploratory", "blocked"]

[scenario.given]
engine = "vllm"
model = "Qwen/Qwen3.6-35B-A3B-FP8"
tool = "qwen_text_smoke"

[scenario.when]
argv = ["--max-num-batched-tokens", "32"]

[scenario.when.env]
VLLM_ROCM_USE_AITER = "0"
VLLM_ROCM_USE_AITER_MOE = "0"

[[scenario.then.assert]]
kind = "exit_code.equals"
value = 1

[[scenario.then.assert]]
kind = "stdout.contains"
value = "config_model_type qwen3_5_moe"

[[scenario.then.assert]]
kind = "stdout.contains"
value = "config_quantization_config_present true"

[[scenario.then.assert]]
kind = "output.contains"
value = "No FP8 MoE backend supports the deployment configuration."

[[scenario]]
id = "vllm.qwen3_6.35b-a3b-fp8.text.fp8-moe-aiter-blocked"
summary = "Qwen3.6 35B-A3B FP8 MoE forced-AITER gfx1151 module_quant probe"
tags = ["qwen", "qwen3.6", "moe", "fp8", "aiter", "kernel-probe", "exploratory", "blocked"]

[scenario.given]
engine = "vllm"
model = "Qwen/Qwen3.6-35B-A3B-FP8"
tool = "qwen_text_smoke"

[scenario.when]
argv = ["--max-num-batched-tokens", "32"]

[scenario.when.env]
VLLM_ROCM_USE_AITER = "1"
VLLM_ROCM_USE_AITER_MOE = "1"

[[scenario.then.assert]]
kind = "exit_code.equals"
value = 1

[[scenario.then.assert]]
kind = "stdout.contains"
value = "config_model_type qwen3_5_moe"

[[scenario.then.assert]]
kind = "stdout.contains"
value = "config_quantization_config_present true"

[[scenario.then.assert]]
kind = "stdout.contains"
value = "Using AITER Fp8 MoE backend"

[[scenario.then.assert]]
kind = "output.contains"
value = "unknown type name 'mfma_adaptor'"

[[recipe_surface]]
id = "vllm.qwen.recipe.qwen3_6.server.reasoning"
summary = "Official Qwen3.6 serving shape with qwen3 reasoning parser"
source_url = "https://docs.vllm.ai/projects/recipes/en/latest/Qwen/Qwen3.5.html#running-qwen3-6"
model = "Qwen/Qwen3.6-35B-A3B"
status = "adapt-before-running"
local_target = "Qwen/Qwen3.6-35B-A3B"
required_flags = [
  "--reasoning-parser qwen3",
  "--max-model-len 262144",
  "--tensor-parallel-size 8",
]
caveats = [
  "The recipe shape targets large multi-GPU deployments; local gfx1151 smokes must use reduced max_model_len and tensor_parallel_size=1.",
  "Compare against the accepted unquantized Qwen3.6 controls before classifying FP8-specific failures.",
]

[[recipe_surface]]
id = "vllm.qwen.recipe.qwen3_6.server.mtp"
summary = "Official Qwen3.6 serving shape with MTP speculative decoding"
source_url = "https://docs.vllm.ai/projects/recipes/en/latest/Qwen/Qwen3.5.html#running-qwen3-6"
model = "Qwen/Qwen3.6-35B-A3B"
status = "adapt-before-running"
local_target = "Qwen/Qwen3.6-35B-A3B"
required_flags = [
  "--reasoning-parser qwen3",
  "--speculative-config {\"method\":\"mtp\",\"num_speculative_tokens\":2}",
]
caveats = [
  "Speculative decoding consumes KV capacity and should remain exploratory on gfx1151 until a reduced local probe passes.",
]

[[recipe_surface]]
id = "vllm.qwen.recipe.qwen3_5.server.throughput_text"
summary = "Official Qwen3.5 FP8 throughput text-only serving shape"
source_url = "https://docs.vllm.ai/projects/recipes/en/latest/Qwen/Qwen3.5.html#text-only"
model = "Qwen/Qwen3.5-397B-A17B-FP8"
status = "advisory-only"
required_flags = [
  "-dp 8",
  "--enable-expert-parallel",
  "--language-model-only",
  "--reasoning-parser qwen3",
  "--enable-prefix-caching",
]
caveats = [
  "The official recipe was verified on 8x H200 and 8x MI300X/MI355X, not gfx1151.",
  "Do not encode this as a passing local scenario without a local model binding and reduced host-safe shape.",
]

[[recipe_surface]]
id = "vllm.qwen.recipe.qwen3_5.server.throughput_multimodal"
summary = "Official Qwen3.5 FP8 throughput multimodal serving shape"
source_url = "https://docs.vllm.ai/projects/recipes/en/latest/Qwen/Qwen3.5.html#multimodal"
model = "Qwen/Qwen3.5-397B-A17B-FP8"
status = "advisory-only"
required_flags = [
  "-dp 8",
  "--enable-expert-parallel",
  "--mm-encoder-tp-mode data",
  "--mm-processor-cache-type shm",
  "--reasoning-parser qwen3",
  "--enable-prefix-caching",
]
caveats = [
  "Multimodal Qwen should stay advisory until a local multimodal checkpoint and request helper exist.",
  "Gemma 4 showed that multimodal warmup behavior must be validated locally on this stack.",
]

[[recipe_surface]]
id = "vllm.qwen.recipe.qwen3_5.server.latency_mtp"
summary = "Official Qwen3.5 FP8 latency-focused MTP serving shape"
source_url = "https://docs.vllm.ai/projects/recipes/en/latest/Qwen/Qwen3.5.html#latency-focused-serving"
model = "Qwen/Qwen3.5-397B-A17B-FP8"
status = "advisory-only"
required_flags = [
  "--tensor-parallel-size 8",
  "--speculative-config {\"method\":\"mtp\",\"num_speculative_tokens\":1}",
  "--reasoning-parser qwen3",
]
caveats = [
  "The recipe states MTP-1 speculative decoding for AMD GPUs is under development.",
  "Do not promote on gfx1151 without a reduced local MTP probe.",
]

[[recipe_surface]]
id = "vllm.qwen.recipe.qwen3_5.server.tool_calling"
summary = "Official Qwen3.5 tool-calling parser addition"
source_url = "https://docs.vllm.ai/projects/recipes/en/latest/Qwen/Qwen3.5.html#multimodal"
