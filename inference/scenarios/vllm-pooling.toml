[[scenario]]
id = "vllm.pooling.multilingual-e5-small.embeddings"
summary = "vLLM pooling embeddings smoke for intfloat multilingual E5 with ROCm FlexAttention"
tags = ["smoke", "vllm", "pooling", "embeddings", "rocm", "flex-attention"]

[scenario.given]
engine = "vllm"
model = "intfloat/multilingual-e5-small"
tool = "vllm_pooling_smoke.embeddings"

[scenario.when]
argv = [
  "--attention-backend",
  "FLEX_ATTENTION",
  "--max-model-len",
  "256",
]

[[scenario.then.assert]]
kind = "exit_code.equals"
value = 0

[[scenario.then.assert]]
kind = "stdout.contains"
value = "runner pooling"

[[scenario.then.assert]]
kind = "stdout.contains"
value = "attention_backend FLEX_ATTENTION"

[[scenario.then.assert]]
kind = "stdout.contains"
value = "embedding_count 3"

[[scenario.then.assert]]
kind = "stdout.contains"
value = "embeddings_finite_ok"

[[scenario.then.assert]]
kind = "stdout.contains"
value = "embedding_ranking_ok"

[[scenario.then.assert]]
kind = "stdout.contains"
value = "embeddings_ok"

[[scenario]]
id = "vllm.pooling.jina-reranker-v3.rerank"
summary = "Jina reranker v3 vLLM pooling probe blocked by remote-code ranking head"
tags = ["smoke", "vllm", "pooling", "rerank", "rocm", "flex-attention", "blocked"]

[scenario.given]
engine = "vllm"
model = "jinaai/jina-reranker-v3"
tool = "vllm_pooling_smoke.rerank"

[scenario.when]
argv = [
  "--attention-backend",
  "FLEX_ATTENTION",
  "--max-model-len",
  "512",
]

[[scenario.then.assert]]
kind = "exit_code.equals"
value = 1

[[scenario.then.assert]]
kind = "stdout.contains"
value = "runner pooling"

[[scenario.then.assert]]
kind = "stdout.contains"
value = "attention_backend FLEX_ATTENTION"

[[scenario.then.assert]]
kind = "stdout.contains"
value = "pooling_task classify"

[[scenario.then.assert]]
kind = "stdout.contains"
value = "convert classify"

[[scenario.then.assert]]
kind = "stdout.contains"
value = "TransformersForSequenceClassification"

[[scenario.then.assert]]
kind = "stderr.contains"
value = "Following weights were not initialized from checkpoint"

[[scenario.then.assert]]
kind = "stderr.contains"
value = "model.lm_head.weight"

[[scenario.then.assert]]
kind = "stderr.contains"
value = "score.weight"
